services:
  xiaohongshu-mcp:
    image: xpzouying/xiaohongshu-mcp:latest
    container_name: xiaohongshu-mcp
    restart: unless-stopped
    init: true
    tty: true
    volumes:
      - xiaohongshu-data:/app/data
    environment:
      - ROD_BROWSER_BIN=/usr/bin/google-chrome
      - DATA_ROOT=/app/data
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
      - no_proxy=*
      - XHS_PROXY=direct://
    dns:
      - 223.5.5.5
      - 114.114.114.114
    ports:
      - "18060:18060"

volumes:
  xiaohongshu-data:
    driver: local
